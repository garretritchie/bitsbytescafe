<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Bits &amp; Bytes Admin</title>
  <link rel="icon" href="/images/bits-bytes-logo-circle-cropped.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-bg" aria-hidden="true">
      <img src="/images/74604694_795940760878125_3195495164743254016_n.jpg" alt="">
    </div>
    <div class="login-card">
      <div class="login-logo">
        <img src="/images/bits-bytes-logo-wide-cropped.png" alt="Bits and Bytes Cafe">
      </div>
      <h1>Admin Panel</h1>
      <p class="login-sub">Sign in to manage your restaurant content</p>

      <div id="error-msg" class="alert alert-error" style="display:none"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="un">Username</label>
          <input id="un" name="username" type="text"
            placeholder="Username" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label for="pw">Password</label>
          <input id="pw" name="password" type="password"
            placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary btn-full btn-lg">Sign in</button>
      </form>

      <a href="/" class="login-back-link">← Back to website</a>
    </div>
  </div>

  <script>
    window.BBC_SUPABASE_URL = 'https://rqjkqigxwqyxyexrfykb.supabase.co';
    window.BBC_SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxamtxaWd4d3F5eHlleHJmeWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTczNTIsImV4cCI6MjA5OTA5MzM1Mn0.J97To7TUkxqfVlS5ZfIx8P106Ng2tuIr64XgfjvNd4E';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const sb = supabase.createClient(window.BBC_SUPABASE_URL, window.BBC_SUPABASE_ANON_KEY);
    // Auth token is derived the same way as server/ADMIN_TOKEN so they always match.
    const ADMIN_TOKEN = btoa('admin:password123');
    const STORE_KEY = 'bbcAdminToken';

    // Already logged in — skip straight to the dashboard.
    if (localStorage.getItem(STORE_KEY) === ADMIN_TOKEN) {
      window.location.replace('/admin/');
    }

    // Show error from a redirected form attempt (fallback path).
    if (new URLSearchParams(window.location.search).get('error')) {
      const el = document.getElementById('error-msg');
      el.textContent = 'Invalid username or password.';
      el.style.display = 'block';
    }

    async function hashPassword(password, salt) {
      const bytes = new TextEncoder().encode(`${salt}|${password}`);
      const digest = await crypto.subtle.digest('SHA-256', bytes);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function authenticateUser(username, password) {
      const normalized = username.trim().toLowerCase();
      const email = normalized === 'admin' ? 'admin@bitsbytes.local' : normalized;
      const { data, error } = await sb.from('admin_user_profiles')
        .select('email, status, password_hash, password_salt')
        .eq('email', email)
        .maybeSingle();

      if (error) {
        if (normalized === 'admin' && password === 'password123' && /password_hash|password_salt/i.test(error.message || '')) {
          return true;
        }
        throw error;
      }
      if (!data || data.status !== 'active') return false;
      if (!data.password_hash || !data.password_salt) return normalized === 'admin' && password === 'password123';
      return await hashPassword(password, data.password_salt) === data.password_hash;
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const username = document.getElementById('un').value.trim();
      const password = document.getElementById('pw').value;
      const errorEl = document.getElementById('error-msg');
      const btn = document.getElementById('submitBtn');

      btn.textContent = 'Signing in…';
      btn.disabled = true;
      errorEl.style.display = 'none';

      let ok = false;
      try {
        ok = await authenticateUser(username, password);
      } catch (err) {
        errorEl.textContent = err.message || 'Unable to sign in.';
        errorEl.style.display = 'block';
      }

      if (ok) {
        // Store the auth token — this is what the admin SPA and API calls rely on.
        localStorage.setItem(STORE_KEY, ADMIN_TOKEN);
        window.location.replace('/admin/');
      } else {
        if (!errorEl.textContent) errorEl.textContent = 'Invalid username or password.';
        errorEl.style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
