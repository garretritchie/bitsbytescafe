<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Bits &amp; Bytes Admin</title>
  <link rel="icon" href="/images/bits-bytes-logo-circle-cropped.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-bg" aria-hidden="true">
      <img src="/images/74604694_795940760878125_3195495164743254016_n.jpg" alt="">
    </div>
    <div class="login-card">
      <div class="login-logo">
        <img src="/images/bits-bytes-logo-wide-cropped.png" alt="Bits and Bytes Cafe">
      </div>
      <h1>Admin Panel</h1>
      <p class="login-sub">Sign in to manage your restaurant content</p>

      <div id="error-msg" class="alert alert-error" style="display:none"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="un">Email or Username</label>
          <input id="un" name="username" type="text"
            placeholder="Email or username" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label for="pw">Password</label>
          <input id="pw" name="password" type="password"
            placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary btn-full btn-lg">Sign in</button>
      </form>

      <a href="/" class="login-back-link">← Back to website</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    window.BBC_SUPABASE_URL = 'https://rqjkqigxwqyxyexrfykb.supabase.co';
    window.BBC_SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxamtxaWd4d3F5eHlleHJmeWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTczNTIsImV4cCI6MjA5OTA5MzM1Mn0.J97To7TUkxqfVlS5ZfIx8P106Ng2tuIr64XgfjvNd4E';
  </script>
  <script>
    const STORE_KEY = 'bbcAdminToken';
    const STORE_EMAIL_KEY = 'bbcAdminEmail';

    const { createClient } = supabase;
    const sb = createClient(window.BBC_SUPABASE_URL, window.BBC_SUPABASE_ANON_KEY);

    // Derive an auth token from email so it's user-specific
    function makeToken(email) { return btoa('bbc:' + email + ':authenticated'); }

    // Already logged in — skip straight to the dashboard
    const storedEmail = localStorage.getItem(STORE_EMAIL_KEY);
    if (storedEmail && localStorage.getItem(STORE_KEY) === makeToken(storedEmail)) {
      window.location.replace('/admin/');
    }

    // Show error from redirect
    if (new URLSearchParams(window.location.search).get('error')) {
      const el = document.getElementById('error-msg');
      el.textContent = 'Invalid email or password.';
      el.style.display = 'block';
    }

    // PBKDF2-SHA256 password utilities using Web Crypto API
    async function pbkdf2Hash(password, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']
      );
      const bits = await crypto.subtle.deriveBits(
        { name: 'PBKDF2', hash: 'SHA-256', salt: enc.encode(salt), iterations: 100000 },
        keyMaterial, 256
      );
      return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function verifyPassword(password, salt, storedHash) {
      const computed = await pbkdf2Hash(password, salt);
      return computed === storedHash;
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const password = document.getElementById('pw').value;
      const errorEl = document.getElementById('error-msg');
      const btn = document.getElementById('submitBtn');

      errorEl.style.display = 'none';
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const input = document.getElementById('un').value.trim().toLowerCase();

        // Support plain username (e.g. "admin") by matching email prefix
        let emailQuery = sb.from('admin_user_profiles').select('id, email, status').limit(1);
        if (input.includes('@')) {
          emailQuery = emailQuery.eq('email', input);
        } else {
          emailQuery = emailQuery.ilike('email', input + '@%');
        }

        const { data: profiles, error: profileErr } = await emailQuery;

        if (profileErr || !profiles || profiles.length === 0) {
          throw new Error('Invalid email or password.');
        }

        const profile = profiles[0];

        if (profile.status === 'disabled') {
          throw new Error('This account has been disabled. Contact your administrator.');
        }

        // Fetch stored credential
        const { data: creds, error: credErr } = await sb
          .from('admin_user_credentials')
          .select('password_hash, password_salt')
          .eq('user_id', profile.id)
          .limit(1);

        if (credErr || !creds || creds.length === 0) {
          throw new Error('Invalid email or password.');
        }

        const { password_hash, password_salt } = creds[0];
        const valid = await verifyPassword(password, password_salt, password_hash);

        if (!valid) {
          throw new Error('Invalid email or password.');
        }

        // Authenticated — store token and email
        localStorage.setItem(STORE_KEY, makeToken(profile.email));
        localStorage.setItem(STORE_EMAIL_KEY, profile.email);
        window.location.replace('/admin/');

      } catch (err) {
        errorEl.textContent = err.message || 'Sign in failed. Please try again.';
        errorEl.style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
